version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: rag-backend
    command: >
      python -m src.api.main
    expose:
      - "8000"
    env_file:
      - ../.env
    restart: unless-stopped
    cpus: 8.0
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: rebuild
          path: ./requirements.txt

  nginx:
    image: nginx:latest
    container_name: rag-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: unless-stopped

  worker:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: rag-worker
    command: >
      python -m src.workers.ingestion_worker
    env_file:
      - ../.env
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src/services/workers
        - action: rebuild
          path: ./requirements.txt

